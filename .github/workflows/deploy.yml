name: Deploy to CorePOS Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Force-sync runtime checkout
        shell: cmd
        run: |
          cd /d C:\CorePOS
          git fetch origin
          git reset --hard origin/main
          git clean -fd

      - name: Deploy CorePOS
        shell: cmd
        run: |
          C:\Users\coreposadmin\corepos-runtime\deploy-corepos.cmd