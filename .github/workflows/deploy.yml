name: Deploy to CorePOS Server

on:
  push:
    branches:
      - main

concurrency:
  group: corepos-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      COREPOS_REPO_PATH: C:\CorePOS
      COREPOS_DEPLOY_ENTRYPOINT: C:\Users\coreposadmin\corepos-runtime\deploy-corepos.cmd
      COREPOS_DEPLOY_BASE_URL: http://127.0.0.1:3000
      COREPOS_DEPLOY_HEALTH_RETRIES: "45"
      COREPOS_DEPLOY_HEALTH_INTERVAL_MS: "2000"
      COREPOS_DEPLOY_REQUEST_TIMEOUT_MS: "5000"

    steps:
      - name: Capture pre-deploy runtime state
        id: preflight
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $repoPath = $env:COREPOS_REPO_PATH
          if (-not (Test-Path $repoPath)) {
            throw "CorePOS runtime checkout was not found at $repoPath"
          }

          $previousCommit = (git -C $repoPath rev-parse HEAD).Trim()
          $previousShortCommit = (git -C $repoPath rev-parse --short HEAD).Trim()
          "previous_commit=$previousCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "previous_short_commit=$previousShortCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          Write-Host "Pre-deploy commit: $previousCommit"
          git -C $repoPath status --short --branch

      - name: Force-sync runtime checkout
        id: sync
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $repoPath = $env:COREPOS_REPO_PATH

          git -C $repoPath fetch origin --prune
          git -C $repoPath reset --hard origin/main
          git -C $repoPath clean -fd

          $targetCommit = (git -C $repoPath rev-parse HEAD).Trim()
          $targetShortCommit = (git -C $repoPath rev-parse --short HEAD).Trim()
          "target_commit=$targetCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "target_short_commit=$targetShortCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          Write-Host "Deploying commit: $targetCommit"
          git -C $repoPath log --oneline -1

      - name: Run Windows deploy entrypoint
        shell: cmd
        run: |
          @echo on
          call "%COREPOS_DEPLOY_ENTRYPOINT%"

      - name: Verify deployed health
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location $env:COREPOS_REPO_PATH
          node scripts/deploy_health_check.js

      - name: Capture failure diagnostics
        if: failure()
        shell: powershell
        env:
          PREVIOUS_COMMIT: ${{ steps.preflight.outputs.previous_commit }}
          TARGET_COMMIT: ${{ steps.sync.outputs.target_commit }}
        run: |
          $ErrorActionPreference = "Continue"
          $repoPath = $env:COREPOS_REPO_PATH
          $rollbackCommand = @(
            "cd /d $repoPath",
            "git reset --hard $env:PREVIOUS_COMMIT",
            "git clean -fd",
            "call `"$($env:COREPOS_DEPLOY_ENTRYPOINT)`""
          ) -join [Environment]::NewLine

          Write-Host "Previous commit: $env:PREVIOUS_COMMIT"
          Write-Host "Target commit:   $env:TARGET_COMMIT"
          Write-Host ""
          Write-Host "Checkout state:"
          git -C $repoPath status --short --branch
          git -C $repoPath log --oneline -5

          if (Get-Command pm2 -ErrorAction SilentlyContinue) {
            Write-Host ""
            Write-Host "PM2 process list:"
            pm2 list
            Write-Host ""
            Write-Host "PM2 describe corepos:"
            pm2 describe corepos
            Write-Host ""
            Write-Host "PM2 logs corepos (last 120 lines):"
            pm2 logs corepos --lines 120 --nostream
          } else {
            Write-Warning "pm2 is not available on PATH for deploy diagnostics."
          }

          foreach ($path in @("/health?details=1", "/api/system/version", "/login")) {
            $url = "$($env:COREPOS_DEPLOY_BASE_URL)$path"
            Write-Host ""
            Write-Host "HTTP probe: $url"
            try {
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 5
              Write-Host "Status: $($response.StatusCode)"
              if ($response.Content) {
                $content = [string]$response.Content
                if ($content.Length -gt 4000) {
                  $content = $content.Substring(0, 4000)
                }
                Write-Host $content
              }
            } catch {
              Write-Warning $_.Exception.Message
            }
          }

          Write-Host ""
          Write-Host "Rollback candidate:"
          Write-Host $rollbackCommand

      - name: Publish deploy summary
        if: always()
        shell: powershell
        env:
          DEPLOY_RESULT: ${{ job.status }}
          PREVIOUS_COMMIT: ${{ steps.preflight.outputs.previous_commit }}
          TARGET_COMMIT: ${{ steps.sync.outputs.target_commit }}
        run: |
          $summary = @(
            "## CorePOS deploy",
            "",
            "- Result: $env:DEPLOY_RESULT",
            "- Previous commit: $env:PREVIOUS_COMMIT",
            "- Target commit: $env:TARGET_COMMIT",
            "- Health probes: $($env:COREPOS_DEPLOY_BASE_URL)/health?details=1, $($env:COREPOS_DEPLOY_BASE_URL)/api/system/version, $($env:COREPOS_DEPLOY_BASE_URL)/login",
            "",
            "### Rollback candidate",
            "```cmd",
            "cd /d $($env:COREPOS_REPO_PATH)",
            "git reset --hard $env:PREVIOUS_COMMIT",
            "git clean -fd",
            "call `"$($env:COREPOS_DEPLOY_ENTRYPOINT)`"",
            "```",
            "",
            "If the failed deploy included a bad production migration, restore the verified database backup before rolling code back."
          )
          $summary -join [Environment]::NewLine | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append