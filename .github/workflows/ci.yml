name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: bike_epos_test
          POSTGRES_PASSWORD: bike_epos_test_pw
          POSTGRES_DB: bike_epos_test
        options: >-
          --health-cmd "pg_isready -U bike_epos_test -d bike_epos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      AUTH_MODE: real
      TEST_DATABASE_URL: postgresql://bike_epos_test:bike_epos_test_pw@localhost:5432/bike_epos_test
      DATABASE_URL: postgresql://bike_epos_test:bike_epos_test_pw@localhost:5432/bike_epos_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json', 'frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start API server
        run: |
          PORT=3100 NODE_ENV=test npx ts-node --transpile-only src/server.ts &
          echo $! > server.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3100/health > /dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          exit 1

      - name: Run release verification
        run: TEST_BASE_URL=http://localhost:3100 ALLOW_EXISTING_SERVER=1 npm run verify

      - name: Stop API server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi
