name: Rollback CorePOS Production

on:
  workflow_dispatch:
    inputs:
      rollback_target:
        description: Roll back to the previous known-good release or a specific known-good SHA
        required: true
        default: previous_successful
        type: choice
        options:
          - previous_successful
          - specific_sha
      commit_sha:
        description: Specific known-good commit SHA to roll back to when rollback_target is specific_sha
        required: false
        type: string

concurrency:
  group: corepos-production-deploy
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      COREPOS_REPO_PATH: C:\CorePOS
      COREPOS_DEPLOY_ENTRYPOINT: C:\Users\coreposadmin\corepos-runtime\deploy-corepos.cmd
      COREPOS_DEPLOY_BASE_URL: http://127.0.0.1:3000
      COREPOS_DEPLOY_HEALTH_RETRIES: "45"
      COREPOS_DEPLOY_HEALTH_INTERVAL_MS: "2000"
      COREPOS_DEPLOY_REQUEST_TIMEOUT_MS: "5000"
      COREPOS_RELEASE_STATE_DIR: C:\CorePOS\.corepos-runtime
      COREPOS_ROLLBACK_WORKFLOW_NAME: Rollback CorePOS Production

    steps:
      - name: Checkout release logic
        uses: actions/checkout@v4

      - name: Validate rollback input
        shell: powershell
        env:
          COREPOS_ROLLBACK_TARGET: ${{ inputs.rollback_target }}
          COREPOS_ROLLBACK_SHA: ${{ inputs.commit_sha }}
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path $env:COREPOS_REPO_PATH)) {
            throw "CorePOS runtime checkout was not found at $env:COREPOS_REPO_PATH"
          }

          if ($env:COREPOS_ROLLBACK_TARGET -eq "specific_sha" -and [string]::IsNullOrWhiteSpace($env:COREPOS_ROLLBACK_SHA)) {
            throw "commit_sha is required when rollback_target is specific_sha."
          }

          Write-Host "Runtime checkout: $env:COREPOS_REPO_PATH"
          git -C $env:COREPOS_REPO_PATH status --short --branch
          git -C $env:COREPOS_REPO_PATH log --oneline -1

      - name: Run shared rollback flow
        shell: powershell
        env:
          COREPOS_ROLLBACK_TARGET: ${{ inputs.rollback_target }}
          COREPOS_ROLLBACK_SHA: ${{ inputs.commit_sha }}
        run: |
          $ErrorActionPreference = "Stop"
          $args = @("scripts/manage_production_release.js", "rollback", "--target", $env:COREPOS_ROLLBACK_TARGET)
          if ($env:COREPOS_ROLLBACK_TARGET -eq "specific_sha") {
            $args += @("--sha", $env:COREPOS_ROLLBACK_SHA.Trim())
          }

          node @args

      - name: Capture failure diagnostics
        if: failure()
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $repoPath = $env:COREPOS_REPO_PATH

          Write-Host "Checkout state:"
          git -C $repoPath status --short --branch
          git -C $repoPath log --oneline -5

          if (Get-Command pm2 -ErrorAction SilentlyContinue) {
            Write-Host ""
            Write-Host "PM2 process list:"
            pm2 list
            Write-Host ""
            Write-Host "PM2 describe corepos:"
            pm2 describe corepos
            Write-Host ""
            Write-Host "PM2 logs corepos (last 120 lines):"
            pm2 logs corepos --lines 120 --nostream
          } else {
            Write-Warning "pm2 is not available on PATH for rollback diagnostics."
          }

          foreach ($path in @("/health?details=1", "/api/system/version", "/login")) {
            $url = "$($env:COREPOS_DEPLOY_BASE_URL)$path"
            Write-Host ""
            Write-Host "HTTP probe: $url"
            try {
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 5
              Write-Host "Status: $($response.StatusCode)"
              if ($response.Content) {
                $content = [string]$response.Content
                if ($content.Length -gt 4000) {
                  $content = $content.Substring(0, 4000)
                }
                Write-Host $content
              }
            } catch {
              Write-Warning $_.Exception.Message
            }
          }

      - name: Publish release summary
        if: always()
        shell: powershell
        run: |
          $summaryPath = Join-Path $env:COREPOS_RELEASE_STATE_DIR "last-release-summary.md"
          if (Test-Path $summaryPath) {
            Get-Content -Raw $summaryPath | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          } else {
            "## CorePOS rollback`n`n- No release summary file was produced." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Notify Slack on rollback success
        if: ${{ success() && secrets.SLACK_WEBHOOK_URL != '' }}
        shell: powershell
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $payload = @{
            text = "🔄 CorePOS rollback succeeded`nWorkflow: rollback`nResult: success`nRef: ${{ github.ref_name }}`nSHA: ${{ github.sha }}`nRun: $env:GITHUB_RUN_URL"
          } | ConvertTo-Json -Compress

          curl.exe --silent --show-error --fail `
            -X POST `
            -H "Content-type: application/json" `
            --data-binary $payload `
            $env:SLACK_WEBHOOK_URL

      - name: Notify Slack on rollback failure
        if: ${{ failure() && secrets.SLACK_WEBHOOK_URL != '' }}
        shell: powershell
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $payload = @{
            text = "⚠️ CorePOS rollback failed`nWorkflow: rollback`nResult: failure`nRef: ${{ github.ref_name }}`nSHA: ${{ github.sha }}`nRun: $env:GITHUB_RUN_URL"
          } | ConvertTo-Json -Compress

          curl.exe --silent --show-error --fail `
            -X POST `
            -H "Content-type: application/json" `
            --data-binary $payload `
            $env:SLACK_WEBHOOK_URL
