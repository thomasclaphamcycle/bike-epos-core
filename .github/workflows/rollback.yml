name: Rollback CorePOS Production

on:
  workflow_dispatch:
    inputs:
      rollback_mode:
        description: Choose the safe rollback path or the backup-restore recovery path
        required: true
        default: previous_safe
        type: choice
        options:
          - previous_safe
          - recovery_mode

concurrency:
  group: corepos-production-deploy
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      COREPOS_REPO_PATH: C:\CorePOS
      COREPOS_DEPLOY_ENTRYPOINT: C:\Users\coreposadmin\corepos-runtime\deploy-corepos.cmd
      COREPOS_DEPLOY_BASE_URL: http://127.0.0.1:3100
      COREPOS_PM2_CMD_PATH: C:\Users\coreposadmin\AppData\Roaming\npm\pm2.cmd
      COREPOS_DEPLOY_HEALTH_RETRIES: "45"
      COREPOS_DEPLOY_HEALTH_INTERVAL_MS: "2000"
      COREPOS_DEPLOY_REQUEST_TIMEOUT_MS: "5000"
      COREPOS_RELEASE_STATE_DIR: C:\CorePOS\.corepos-runtime
      COREPOS_ROLLBACK_WORKFLOW_NAME: Rollback CorePOS Production

    steps:
      - name: Checkout release logic
        uses: actions/checkout@v4

      - name: Validate rollback input
        shell: powershell
        env:
          COREPOS_ROLLBACK_MODE: ${{ inputs.rollback_mode }}
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path $env:COREPOS_REPO_PATH)) {
            throw "CorePOS runtime checkout was not found at $env:COREPOS_REPO_PATH"
          }

          if ($env:COREPOS_ROLLBACK_MODE -notin @("previous_safe", "recovery_mode")) {
            throw "rollback_mode must be previous_safe or recovery_mode."
          }

          Write-Host "Runtime checkout: $env:COREPOS_REPO_PATH"
          Write-Host "Rollback mode: $env:COREPOS_ROLLBACK_MODE"
          git -C $env:COREPOS_REPO_PATH status --short --branch
          git -C $env:COREPOS_REPO_PATH log --oneline -1

      - name: Run shared rollback flow
        shell: powershell
        env:
          COREPOS_SKIP_GIT_PULL: "1"
          COREPOS_ROLLBACK_MODE: ${{ inputs.rollback_mode }}
        run: |
          $ErrorActionPreference = "Stop"
          $args = @("scripts/manage_production_release.js", "rollback", "--mode", $env:COREPOS_ROLLBACK_MODE)
          node @args

      - name: Capture failure diagnostics
        if: failure()
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $repoPath = $env:COREPOS_REPO_PATH

          Write-Host "Checkout state:"
          git -C $repoPath status --short --branch
          git -C $repoPath log --oneline -5

          $pm2Cmd = $env:COREPOS_PM2_CMD_PATH
          if ($pm2Cmd -and (Test-Path $pm2Cmd)) {
            Write-Host ""
            Write-Host "PM2 process list:"
            & $pm2Cmd list
            foreach ($processName in @("corepos-backend", "corepos-frontend", "cloudflared")) {
              Write-Host ""
              Write-Host "PM2 describe $processName:"
              & $pm2Cmd describe $processName
              Write-Host ""
              Write-Host "PM2 logs $processName (last 120 lines):"
              & $pm2Cmd logs $processName --lines 120 --nostream
            }
          } else {
            Write-Warning "PM2 diagnostics unavailable because COREPOS_PM2_CMD_PATH was not found."
          }

          foreach ($path in @("/health?details=1", "/api/system/version", "/login")) {
            $url = "$($env:COREPOS_DEPLOY_BASE_URL)$path"
            Write-Host ""
            Write-Host "HTTP probe: $url"
            try {
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 5
              Write-Host "Status: $($response.StatusCode)"
              if ($response.Content) {
                $content = [string]$response.Content
                if ($content.Length -gt 4000) {
                  $content = $content.Substring(0, 4000)
                }
                Write-Host $content
              }
            } catch {
              Write-Warning $_.Exception.Message
            }
          }

      - name: Publish release summary
        if: always()
        shell: powershell
        run: |
          $summaryPath = Join-Path $env:COREPOS_RELEASE_STATE_DIR "last-release-summary.md"
          if (Test-Path $summaryPath) {
            Get-Content -Raw $summaryPath | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          } else {
            "## CorePOS rollback`n`n- No release summary file was produced." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Notify Slack on rollback success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        shell: powershell
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $payload = @{
            text = "[ROLLBACK OK] CorePOS rollback succeeded`nWorkflow: rollback`nResult: success`nRef: ${{ github.ref_name }}`nSHA: ${{ github.sha }}`nRun: $env:GITHUB_RUN_URL"
          } | ConvertTo-Json -Compress

          Invoke-RestMethod -Method Post `
            -Uri $env:SLACK_WEBHOOK_URL `
            -ContentType "application/json" `
            -Body $payload

      - name: Notify Slack on rollback failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        shell: powershell
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $payload = @{
            text = "[ROLLBACK FAIL] CorePOS rollback failed`nWorkflow: rollback`nResult: failure`nRef: ${{ github.ref_name }}`nSHA: ${{ github.sha }}`nRun: $env:GITHUB_RUN_URL"
          } | ConvertTo-Json -Compress

          Invoke-RestMethod -Method Post `
            -Uri $env:SLACK_WEBHOOK_URL `
            -ContentType "application/json" `
            -Body $payload
